# dpo/controls/gdpr.yml — DSGVO-Kontrollkatalog (BOO-87)
# Deterministischer Kontrollkatalog, vom dpo-AUDIT-Modus abgearbeitet.
# Kuratiert aus dem DSGVO-Text — KEINE Rechtsberatung, der Operator entscheidet.
#
# Flaches Schema (dependency-frei, Mini-Parser im Runner):
#   id        Control-ID
#   titel     Klartext-Bezeichnung
#   evidenz   geforderter Nachweis
#   check_typ file-exists | file-contains | grep-absent | review
#   check_arg  file-exists  -> Pfad
#              file-contains -> 'Pfad::Suchtext'
#              grep-absent   -> Regex (GAP wenn in Source gefunden; PASS wenn abwesend)
#              review        -> '' (Urteils-Check -> REVIEW-NEEDED)
#   mapsTo    Verweis auf Check/Artefakt
#   quelle    Herkunft (DSGVO-Artikel) — Pflicht, Audit-Beleg
#   ergebnis  wird beim Lauf gesetzt (PASS|GAP|REVIEW-NEEDED) — hier leer

- id: GDPR-Art13-001
  titel: Datenschutzerklaerung vorhanden
  evidenz: 'Datenschutzerklaerung/Privacy-Doku im Projekt'
  check_typ: file-exists
  check_arg: 'PRIVACY.md'
  mapsTo: 'PRIVACY.md'
  quelle: 'DSGVO Art. 13/14'
  ergebnis: ''

- id: GDPR-Art30-001
  titel: Verarbeitungsverzeichnis vorhanden
  evidenz: 'PRIVACY.md enthaelt eine Verarbeitungsverzeichnis-Sektion'
  check_typ: file-contains
  check_arg: 'PRIVACY.md::Verarbeitungsverzeichnis'
  mapsTo: 'PRIVACY.md Verarbeitungsverzeichnis; references/verarbeitungsverzeichnis.md'
  quelle: 'DSGVO Art. 30'
  ergebnis: ''

- id: GDPR-Art17-001
  titel: Loeschkonzept dokumentiert
  evidenz: 'PRIVACY.md nennt Loeschfristen pro Datenkategorie'
  check_typ: file-contains
  check_arg: 'PRIVACY.md::Loeschfrist'
  mapsTo: 'PRIVACY.md Loeschkonzept'
  quelle: 'DSGVO Art. 17'
  ergebnis: ''

- id: GDPR-Art32-001
  titel: Keine Klartext-Secrets im Code (Vertraulichkeit)
  evidenz: 'Keine hardcoded AWS-Keys/Secrets im Quellcode'
  check_typ: grep-absent
  check_arg: 'AKIA[0-9A-Z]{16}'
  mapsTo: 'Bodyguard Layer 0 (BOO-86) + Secret-Scan'
  quelle: 'DSGVO Art. 32'
  ergebnis: ''

- id: GDPR-Art32-002
  titel: TLS-Zertifikatspruefung nicht abgeschaltet
  evidenz: 'Keine abgeschaltete Zertifikatspruefung im Code'
  check_typ: grep-absent
  check_arg: '(verify\s*=\s*False|rejectUnauthorized\s*:\s*false|NODE_TLS_REJECT_UNAUTHORIZED\s*=\s*.?0)'
  mapsTo: 'DSGVO Art. 32 Integritaet/Vertraulichkeit; Security Architect'
  quelle: 'DSGVO Art. 32'
  ergebnis: ''

- id: GDPR-Art6-001
  titel: Rechtsgrundlage je Verarbeitung
  evidenz: 'Jede Verarbeitung nennt eine Rechtsgrundlage nach Art. 6'
  check_typ: review
  check_arg: ''
  mapsTo: 'PRIVACY.md Rechtsgrundlagen; manuelle Pruefung'
  quelle: 'DSGVO Art. 6 Abs. 1'
  ergebnis: ''

- id: GDPR-Art5-001
  titel: Zweckbindung
  evidenz: 'Jede Verarbeitung hat einen festgelegten, dokumentierten Zweck'
  check_typ: review
  check_arg: ''
  mapsTo: 'PRIVACY.md Zwecke; Datenfluss-Review'
  quelle: 'DSGVO Art. 5 Abs. 1 lit. b'
  ergebnis: ''

- id: GDPR-Art5-002
  titel: Datenminimierung
  evidenz: 'Nur fuer den Zweck notwendige Datenfelder werden erhoben'
  check_typ: review
  check_arg: ''
  mapsTo: 'Datenmodell-Review'
  quelle: 'DSGVO Art. 5 Abs. 1 lit. c'
  ergebnis: ''

- id: GDPR-Art28-001
  titel: Auftragsverarbeitung (AVV) erfasst
  evidenz: 'Alle externen Dienstleister mit AVV/DPA dokumentiert'
  check_typ: review
  check_arg: ''
  mapsTo: 'PRIVACY.md Auftragsverarbeiter'
  quelle: 'DSGVO Art. 28'
  ergebnis: ''
